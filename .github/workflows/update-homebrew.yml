name: Update Homebrew Formula

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update (e.g., 0.13.0)'
        required: true
        type: string

jobs:
  update-formula:
    runs-on: macos-latest
    steps:
      - name: Get release info
        id: release
        run: |
          # Use manual input version if triggered manually, otherwise get from release tag
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/v}
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          DMG_URL="https://github.com/tweakphp/tweakphp/releases/download/v${VERSION}/TweakPHP-${VERSION}-universal.dmg"
          echo "Downloading DMG to calculate SHA256..."
          SHA256=$(curl -Ls "$DMG_URL" | shasum -a 256 | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"
          echo "SHA256: $SHA256"

      - name: Checkout tap repository
        uses: actions/checkout@v4
        with:
          repository: tweakphp/homebrew-tap
          token: ${{ secrets.TAP_GITHUB_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          cat > homebrew-tap/Casks/tweakphp.rb << 'EOF'
          cask "tweakphp" do
            version "${{ steps.release.outputs.version }}"
            sha256 "${{ steps.release.outputs.sha256 }}"

            url "https://github.com/tweakphp/tweakphp/releases/download/v#{version}/TweakPHP-#{version}-universal.dmg"
            name "TweakPHP"
            desc "Desktop application with a code editor to tweak your PHP code"
            homepage "https://tweakphp.com/"

            livecheck do
              url :url
              strategy :github_latest
            end

            app "TweakPHP.app"

            zap trash: [
              "~/Library/Application Support/TweakPHP",
              "~/Library/Caches/com.tweakphp.app",
              "~/Library/Caches/com.tweakphp.app.ShipIt",
              "~/Library/Logs/TweakPHP",
              "~/Library/Preferences/com.tweakphp.app.plist",
              "~/Library/Saved Application State/com.tweakphp.app.savedState",
            ]
          end
          EOF

      - name: Commit and push
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/tweakphp.rb
          git diff --staged --quiet || git commit -m "Update TweakPHP to v${{ steps.release.outputs.version }}"
          git push
